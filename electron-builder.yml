appId: com.joddizgaren.djclipstudio
productName: DJ Clip Studio

# Where electron-builder looks for the packaged app files
directories:
  output: release
  buildResources: electron/build-resources

# Inject main entry point into package.json at build time (does NOT modify the file)
extraMetadata:
  main: dist/electron/main.cjs

# Files bundled inside the ASAR (the app package)
files:
  - dist/electron/main.cjs
  - dist/electron/preload.js
  - dist/electron/public/**/*
  - package.json

# Files copied to resources/ alongside the ASAR (accessible via process.resourcesPath)
# These are NOT inside the ASAR so large binaries work correctly.
# node:sqlite is used for the database (built into Electron's Node.js runtime),
# so no native addon needs to be bundled here.
extraResources:
  - from: dist/electron/server.cjs
    to: server.cjs
  - from: dist/electron/ffmpeg
    to: ffmpeg

# ─── Windows ─────────────────────────────────────────────────────────────────
win:
  icon: electron/build-resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

# Register djclipstudio:// as a Windows URL protocol so password-recovery
# email links open the app instead of a browser.
protocols:
  name: DJ Clip Studio
  schemes:
    - djclipstudio

nsis:
  oneClick: false
  # perMachine installs to C:\Program Files\ and requires UAC elevation.
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DJ Clip Studio
  installerIcon: electron/build-resources/icon.ico
  uninstallerIcon: electron/build-resources/icon.ico
  installerHeaderIcon: electron/build-resources/icon.ico
  deleteAppDataOnUninstall: false

# ─── macOS (optional, future) ─────────────────────────────────────────────────
mac:
  category: public.app-category.music
  target:
    - target: dmg
      arch:
        - x64
        - arm64

# ─── Auto-update (GitHub Releases) ───────────────────────────────────────────
publish:
  provider: github
  owner: joddizgaren
  repo: dj-clip-finder
  releaseType: release
