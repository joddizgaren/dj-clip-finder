appId: com.joddizgaren.djclipstudio
productName: DJ Clip Studio

# Never rebuild native modules — server-bundle.js is fully self-contained.
npmRebuild: false

# Hook that reliably copies public/ into the packaged app's resources/
afterPack: script/afterPack.cjs

directories:
  output: release
  buildResources: electron/build-resources

extraMetadata:
  main: dist/electron/main.cjs

# ONLY the Electron main-process files go inside the ASAR.
# server-bundle.js, public/, and ffmpeg/ all live in resources/
# (extraResources) so the server process can reach them at real paths.
files:
  - dist/electron/main.cjs
  - dist/electron/preload.js
  - package.json

extraResources:
  - from: dist/electron/server-bundle.js
    to: server-bundle.js
  - from: dist/electron/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"

win:
  icon: electron/build-resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  signAndEditExecutable: false
  signExts: []

protocols:
  name: DJ Clip Studio
  schemes:
    - djclipstudio

nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DJ Clip Studio
  installerIcon: electron/build-resources/icon.ico
  uninstallerIcon: electron/build-resources/icon.ico
  installerHeaderIcon: electron/build-resources/icon.ico
  deleteAppDataOnUninstall: false

mac:
  category: public.app-category.music
  target:
    - target: dmg
      arch:
        - x64
        - arm64

publish:
  provider: github
  owner: joddizgaren
  repo: dj-clip-finder
  releaseType: release
